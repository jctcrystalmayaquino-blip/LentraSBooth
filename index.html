<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LentraSBooth | Full Screen</title>
    <style>
        :root { --accent: #ff4757; }
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #000; color: white; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* The Stage */
        #stage { 
            position: relative; width: 100%; max-width: 600px; 
            aspect-ratio: 16/9; border: 2px solid #444; overflow: hidden; background: #111;
            border-radius: 8px;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .bw-mode { filter: grayscale(100%); -webkit-filter: grayscale(100%); }

        /* Full Screen Toggle Button */
        #fsToggle {
            position: absolute; top: 10px; right: 10px; z-index: 20;
            background: rgba(0,0,0,0.5); border: 1px solid #fff; color: white;
            padding: 8px; border-radius: 5px; font-size: 12px; cursor: pointer;
        }

        #countdown {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; font-weight: bold; z-index: 10; pointer-events: none;
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 11; pointer-events: none;
        }
        .flash-active { animation: flash 0.3s ease-out; }
        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }

        .controls { width: 100%; max-width: 600px; margin: 15px 0; display: flex; gap: 10px; }
        #snap { flex-grow: 1; padding: 18px; font-size: 1.1rem; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
        #filterToggle { padding: 18px; font-size: 1.1rem; border-radius: 8px; border: 2px solid #444; background: #222; color: white; font-weight: bold; cursor: pointer; width: 100px; }

        #gallery { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 400px; padding-bottom: 40px; }
        .strip { background: white; padding: 15px; border-radius: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 10px;}
        .strip img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

    <h3 id="title" style="margin: 10px 0;">LENTRASBOOTH</h3>

    <div id="stage">
        <button id="fsToggle">⛶ FULLSCREEN</button>
        <div id="countdown"></div>
        <div id="flash"></div>
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="filterToggle">COLOR</button>
        <button id="snap">TAKE 4 PHOTOS</button>
    </div>

    <div id="gallery"></div>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const snapBtn = document.getElementById('snap');
        const filterBtn = document.getElementById('filterToggle');
        const fsBtn = document.getElementById('fsToggle');
        const countdownEl = document.getElementById('countdown');
        const flashEl = document.getElementById('flash');
        const gallery = document.getElementById('gallery');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let isBnW = false;

        // Camera Init
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(s => video.srcObject = s);

        // --- Full Screen Logic ---
        fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable full-screen mode: ${err.message}`);
                });
                fsBtn.innerText = "EXIT FS";
            } else {
                document.exitFullscreen();
                fsBtn.innerText = "⛶ FULLSCREEN";
            }
        });

        // Filter Toggle
        filterBtn.addEventListener('click', () => {
            isBnW = !isBnW;
            filterBtn.innerText = isBnW ? "B&W" : "COLOR";
            video.classList.toggle('bw-mode', isBnW);
        });

        // Capture Logic (with Anti-Stretch Math)
        snapBtn.addEventListener('click', async () => {
            snapBtn.disabled = true;
            const captures = [];
            for (let i = 0; i < 4; i++) {
                for (let c = 3; c > 0; c--) {
                    countdownEl.innerText = c;
                    await new Promise(r => setTimeout(r, 1000));
                }
                countdownEl.innerText = "";
                flashEl.classList.add('flash-active');
                setTimeout(() => flashEl.classList.remove('flash-active'), 300);

                const temp = document.createElement('canvas');
                temp.width = 1280; temp.height = 720;
                const tCtx = temp.getContext('2d');
                
                const vW = video.videoWidth;
                const vH = video.videoHeight;
                const targetRatio = 16 / 9;
                let sW, sH, sX, sY;

                if ((vW / vH) > targetRatio) {
                    sH = vH; sW = vH * targetRatio; sX = (vW - sW) / 2; sY = 0;
                } else {
                    sW = vW; sH = vW / targetRatio; sX = 0; sY = (vH - sH) / 2;
                }

                if (isBnW) tCtx.filter = 'grayscale(100%)';
                tCtx.translate(temp.width, 0);
                tCtx.scale(-1, 1);
                tCtx.drawImage(video, sX, sY, sW, sH, 0, 0, temp.width, temp.height);
                captures.push(temp);
                await new Promise(r => setTimeout(r, 500)); 
            }
            render(captures);
            snapBtn.disabled = false;
        });

        function render(images) {
            const w = 1280, h = 720, p = 50;
            canvas.width = w + (p * 2);
            canvas.height = (h * 4) + (p * 5);
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            images.forEach((img, i) => {
                ctx.drawImage(img, p, p + (i * (h + p)));
            });
            const data = canvas.toDataURL('image/png');
            const div = document.createElement('div');
            div.className = 'strip';
            div.innerHTML = `<img src="${data}">`;
            div.onclick = () => {
                const a = document.createElement('a');
                a.href = data; a.download = `booth-${Date.now()}.png`; a.click();
            };
            gallery.prepend(div);
        }
    </script>
</body>
</html>
