<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Landscape Photobooth</title>
    <style>
        :root { --accent: #ff4757; --bg: #121212; }
        * { box-sizing: border-box; }
        
        body { 
            font-family: sans-serif; display: flex; flex-direction: column; 
            align-items: center; background: var(--bg); color: white; 
            margin: 0; padding: 10px; min-height: 100vh;
        }

        /* Stage set for Landscape (4:3) */
        #stage { 
            position: relative; width: 100%; max-width: 500px; 
            aspect-ratio: 4/3; border: 4px solid #333; 
            border-radius: 12px; overflow: hidden; background: #000;
        }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        #countdown {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 100px; font-weight: 900; z-index: 10;
        }

        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 11; pointer-events: none;
        }
        .flash-active { animation: flashAnim 0.4s ease-out; }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

        .controls { width: 100%; max-width: 500px; margin: 20px 0; }
        
        #snap { 
            width: 100%; padding: 18px; font-size: 1.1rem; cursor: pointer; border: none; 
            border-radius: 10px; background: var(--accent); color: white; font-weight: bold;
        }

        #gallery { 
            display: flex; flex-direction: column; gap: 20px; 
            width: 100%; max-width: 500px; padding-bottom: 50px;
        }

        .strip-container { 
            background: white; padding: 12px; border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .strip-container img { width: 100%; height: auto; display: block; }
        .footer-text { color: #333; font-size: 12px; text-align: center; margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="stage">
        <div id="countdown"></div>
        <div id="flash"></div>
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="snap">TAKE 4 LANDSCAPE PHOTOS</button>
    </div>

    <div id="gallery"></div>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const snapBtn = document.getElementById('snap');
        const countdownEl = document.getElementById('countdown');
        const flashEl = document.getElementById('flash');
        const gallery = document.getElementById('gallery');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; });

        snapBtn.addEventListener('click', async () => {
            snapBtn.disabled = true;
            const captures = [];

            for (let i = 0; i < 4; i++) {
                for (let count = 3; count > 0; count--) {
                    countdownEl.innerText = count;
                    await new Promise(r => setTimeout(r, 1000));
                }
                countdownEl.innerText = "";

                flashEl.classList.remove('flash-active');
                void flashEl.offsetWidth; 
                flashEl.classList.add('flash-active');

                const tempCanvas = document.createElement('canvas');
                // Use Landscape Dimensions
                tempCanvas.width = 1280; 
                tempCanvas.height = 720;
                const tCtx = tempCanvas.getContext('2d');
                
                tCtx.translate(tempCanvas.width, 0);
                tCtx.scale(-1, 1);
                tCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
                captures.push(tempCanvas);
                
                await new Promise(r => setTimeout(r, 600)); 
            }

            renderStrip(captures);
            snapBtn.disabled = false;
        });

        function renderStrip(images) {
            const w = images[0].width;
            const h = images[0].height;
            const p = 40; // White border/padding

            // Create a vertical strip for landscape photos
            canvas.width = w + (p * 2);
            canvas.height = (h * 4) + (p * 5);
            
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            images.forEach((img, i) => {
                ctx.drawImage(img, p, p + (i * (h + p)));
            });

            const data = canvas.toDataURL('image/png');
            const div = document.createElement('div');
            div.className = 'strip-container';
            div.innerHTML = `<img src="${data}"><div class="footer-text">A's PHOTOBOOTH SERVICES</div>`;
            
            div.onclick = () => {
                const a = document.createElement('a');
                a.href = data;
                a.download = `landscape-strip.png`;
                a.click();
            };

            gallery.prepend(div);
        }
    </script>
</body>
</html>
