<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LentraSBooth | Instax Edition</title>
    <style>
        :root { --accent: #ff4757; }
        body { font-family: sans-serif; background: #000; color: white; margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; }
        
        #stage { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; z-index: 10; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .bw-mode { filter: grayscale(100%); }

        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 25vw; font-weight: 900; z-index: 20; text-shadow: 0 0 30px rgba(0,0,0,0.8); pointer-events: none; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 21; pointer-events: none; }
        .flash-active { animation: flash 0.3s ease-out; }
        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* Selection Screen */
        #selectionOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95); z-index: 50; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .options-container { display: flex; gap: 10px; width: 90%; justify-content: center; }
        .option-card { width: 30%; border: 3px solid transparent; border-radius: 8px; overflow: hidden; cursor: pointer; }
        .option-card img { width: 100%; display: block; }
        .option-card.selected { border-color: var(--accent); }

        /* Instax Result Overlay */
        #resultOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .instax-frame { 
            background: #fdfdfd; padding: 20px 20px 80px 20px; /* Wider bottom for Instax look */
            box-shadow: 0 10px 50px rgba(0,0,0,0.8); border-radius: 4px;
        }
        .instax-frame img { width: 280px; height: 350px; object-fit: cover; display: block; border: 1px solid #ddd; }
        
        .btn-row { display: flex; gap: 15px; margin-top: 30px; }
        .btn { padding: 15px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        #saveBtn { background: var(--accent); color: white; }
        #closeBtn { background: #444; color: white; }
        
        #hint { position: absolute; bottom: 10%; width: 100%; text-align: center; font-size: 1.2rem; z-index: 15; pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="stage" onclick="startSession()">
        <div id="hint">TAP TO START (3 SHOTS)</div>
        <div id="countdown"></div>
        <div id="flash"></div>
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="selectionOverlay">
        <h2 style="margin-bottom: 20px;">CHOOSE YOUR FAVORITE</h2>
        <div class="options-container" id="options"></div>
    </div>

    <div id="resultOverlay">
        <div class="instax-frame" id="instaxFrame"></div>
        <div class="btn-row">
            <button class="btn" id="saveBtn">DOWNLOAD INSTAX</button>
            <button class="btn" id="closeBtn" onclick="location.reload()">RETAKE</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const countdownEl = document.getElementById('countdown');
        const flashEl = document.getElementById('flash');
        const selectionOverlay = document.getElementById('selectionOverlay');
        const optionsContainer = document.getElementById('options');
        const resultOverlay = document.getElementById('resultOverlay');
        const instaxFrame = document.getElementById('instaxFrame');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let capturedImages = [];
        let isShooting = false;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(s => video.srcObject = s);

        async function startSession() {
            if (isShooting) return;
            isShooting = true;
            document.getElementById('hint').style.display = 'none';
            capturedImages = [];

            for (let i = 0; i < 3; i++) {
                for (let c = 3; c > 0; c--) {
                    countdownEl.innerText = c;
                    await new Promise(r => setTimeout(r, 1000));
                }
                countdownEl.innerText = "";
                flashEl.classList.add('flash-active');
                setTimeout(() => flashEl.classList.remove('flash-active'), 300);

                const temp = document.createElement('canvas');
                temp.width = 800; temp.height = 1000; // Instax Photo Ratio
                const tCtx = temp.getContext('2d');
                
                // Crop Logic for Vertical Instax
                const vW = video.videoWidth;
                const vH = video.videoHeight;
                const targetRatio = 800 / 1000;
                let sW, sH, sX, sY;

                if ((vW / vH) > targetRatio) {
                    sH = vH; sW = vH * targetRatio; sX = (vW - sW) / 2; sY = 0;
                } else {
                    sW = vW; sH = vW / targetRatio; sX = 0; sY = (vH - sH) / 2;
                }

                tCtx.translate(temp.width, 0);
                tCtx.scale(-1, 1);
                tCtx.drawImage(video, sX, sY, sW, sH, 0, 0, temp.width, temp.height);
                capturedImages.push(temp.toDataURL('image/png'));
                await new Promise(r => setTimeout(r, 500)); 
            }

            showSelection();
        }

        function showSelection() {
            selectionOverlay.style.display = 'flex';
            optionsContainer.innerHTML = '';
            capturedImages.forEach((src, idx) => {
                const div = document.createElement('div');
                div.className = 'option-card';
                div.innerHTML = `<img src="${src}">`;
                div.onclick = () => generateInstax(src);
                optionsContainer.appendChild(div);
            });
        }

        function generateInstax(selectedSrc) {
            selectionOverlay.style.display = 'none';
            
            // Instax Canvas Dimensions
            const p = 40; // Side padding
            const bottomP = 160; // Signature area
            canvas.width = 800 + (p * 2);
            canvas.height = 1000 + p + bottomP;

            // Draw Frame
            ctx.fillStyle = "#fdfdfd"; // Off-white Instax paper
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, p, p, 800, 1000);
                
                // Subtle shadow/border inside
                ctx.strokeStyle = "#ddd";
                ctx.strokeRect(p, p, 800, 1000);

                const finalData = canvas.toDataURL('image/png');
                instaxFrame.innerHTML = `<img src="${finalData}">`;
                resultOverlay.style.display = 'flex';

                document.getElementById('saveBtn').onclick = () => {
                    const a = document.createElement('a');
                    a.href = finalData; a.download = `instax-${Date.now()}.png`; a.click();
                };
            };
            img.src = selectedSrc;
        }
    </script>
</body>
</html>
