<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LentraSBooth | Pro Flow</title>
    <style>
        :root { --accent: #ff4757; }
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        #stage { 
            position: relative; width: 100vw; height: 56.25vw; /* 16:9 ratio */
            max-width: 800px; max-height: 450px;
            overflow: hidden; background: #111; border-bottom: 2px solid #333;
            transition: all 0.5s ease;
        }

        /* Full Screen Class */
        body.is-shooting #stage {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            max-width: none; max-height: none; z-index: 100; border: none;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .bw-mode { filter: grayscale(100%); }

        #countdown {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 15vw; font-weight: 900; z-index: 110; pointer-events: none;
            text-shadow: 0 0 30px rgba(0,0,0,0.8); color: #fff;
        }

        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 111; pointer-events: none;
        }
        .flash-active { animation: flash 0.3s ease-out; }
        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }

        .controls { padding: 20px; width: 100%; max-width: 400px; display: flex; gap: 10px; box-sizing: border-box; }
        body.is-shooting .controls { display: none; }

        #snap { flex-grow: 1; padding: 20px; font-size: 1.2rem; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; }
        #filterToggle { padding: 20px; font-size: 1rem; border-radius: 12px; border: 2px solid #444; background: #222; color: white; font-weight: bold; width: 100px; }

        #gallery { display: flex; flex-direction: column; gap: 20px; width: 90%; max-width: 400px; padding-bottom: 50px; }
        .strip { background: white; padding: 15px; border-radius: 2px; box-shadow: 0 10px 40px rgba(0,0,0,1); }
        .strip img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

    <div id="stage">
        <div id="countdown"></div>
        <div id="flash"></div>
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="filterToggle">COLOR</button>
        <button id="snap">START SESSION</button>
    </div>

    <div id="gallery"></div>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const snapBtn = document.getElementById('snap');
        const filterBtn = document.getElementById('filterToggle');
        const countdownEl = document.getElementById('countdown');
        const flashEl = document.getElementById('flash');
        const gallery = document.getElementById('gallery');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let isBnW = false;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(s => video.srcObject = s);

        filterBtn.addEventListener('click', () => {
            isBnW = !isBnW;
            filterBtn.innerText = isBnW ? "B&W" : "COLOR";
            video.classList.toggle('bw-mode', isBnW);
        });

        snapBtn.addEventListener('click', async () => {
            // ENTER CINEMA MODE
            document.body.classList.add('is-shooting');
            // Try to trigger browser fullscreen for a cleaner look
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            const captures = [];
            for (let i = 0; i < 4; i++) {
                for (let c = 3; c > 0; c--) {
                    countdownEl.innerText = c;
                    await new Promise(r => setTimeout(r, 1000));
                }
                countdownEl.innerText = "";
                flashEl.classList.add('flash-active');
                setTimeout(() => flashEl.classList.remove('flash-active'), 300);

                const temp = document.createElement('canvas');
                temp.width = 1280; temp.height = 720;
                const tCtx = temp.getContext('2d');
                
                const vW = video.videoWidth;
                const vH = video.videoHeight;
                const targetRatio = 16 / 9;
                let sW, sH, sX, sY;

                if ((vW / vH) > targetRatio) {
                    sH = vH; sW = vH * targetRatio; sX = (vW - sW) / 2; sY = 0;
                } else {
                    sW = vW; sH = vW / targetRatio; sX = 0; sY = (vH - sH) / 2;
                }

                if (isBnW) tCtx.filter = 'grayscale(100%)';
                tCtx.translate(temp.width, 0);
                tCtx.scale(-1, 1);
                tCtx.drawImage(video, sX, sY, sW, sH, 0, 0, temp.width, temp.height);
                captures.push(temp);
                await new Promise(r => setTimeout(r, 500)); 
            }

            // EXIT CINEMA MODE
            document.body.classList.remove('is-shooting');
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(() => {});
            }

            render(captures);
        });

        function render(images) {
            const w = 1280, h = 720, p = 50;
            canvas.width = w + (p * 2);
            canvas.height = (h * 4) + (p * 5);
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            images.forEach((img, i) => {
                ctx.drawImage(img, p, p + (i * (h + p)));
            });
            const data = canvas.toDataURL('image/png');
            const div = document.createElement('div');
            div.className = 'strip';
            div.innerHTML = `<img src="${data}">`;
            div.onclick = () => {
                const a = document.createElement('a');
                a.href = data; a.download = `booth-${Date.now()}.png`; a.click();
            };
            gallery.prepend(div);
            // Scroll to the top so user sees their photo
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
