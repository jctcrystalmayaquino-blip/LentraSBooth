<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Photobooth</title>
    <style>
        :root { --accent: #ff4757; --bg: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background: var(--bg); color: white; margin: 0; padding: 20px;
            min-height: 100vh;
        }

        h2 { margin-top: 0; letter-spacing: 1px; color: #eee; }

        #stage { 
            position: relative; width: 100%; max-width: 400px; 
            aspect-ratio: 3/4; border: 4px solid #333; 
            border-radius: 20px; overflow: hidden; background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        #countdown {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 120px; font-weight: 900; color: white; 
            text-shadow: 0 0 30px rgba(0,0,0,0.8); z-index: 10;
        }

        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 11;
        }
        .flash-active { animation: flashAnim 0.4s ease-out; }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

        .controls { width: 100%; max-width: 400px; margin: 25px 0; }
        
        #snap { 
            width: 100%; padding: 20px; font-size: 1.2rem; cursor: pointer; border: none; 
            border-radius: 15px; background: var(--accent); color: white; font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }
        #snap:disabled { background: #444; box-shadow: none; opacity: 0.7; }

        #gallery { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; width: 100%; max-width: 500px; margin-top: 20px;
        }

        .strip-container { 
            background: white; padding: 8px; border-radius: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.2s;
        }
        .strip-container img { width: 100%; height: auto; display: block; }
        .footer-text { color: #888; font-size: 10px; text-align: center; margin-top: 5px; font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body>

    <h2>PHOTOBOOTH</h2>
    
    <div id="stage">
        <div id="countdown"></div>
        <div id="flash"></div>
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="snap">TAKE 4 PHOTOS</button>
    </div>

    <div id="gallery"></div>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const snapBtn = document.getElementById('snap');
        const countdownEl = document.getElementById('countdown');
        const flashEl = document.getElementById('flash');
        const gallery = document.getElementById('gallery');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Request Front Camera
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user" }, 
            audio: false 
        })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { alert("Please allow camera access to use the photobooth."); });

        snapBtn.addEventListener('click', async () => {
            snapBtn.disabled = true;
            snapBtn.innerText = "GET READY...";
            const captures = [];

            for (let i = 0; i < 4; i++) {
                // Countdown
                for (let count = 3; count > 0; count--) {
                    countdownEl.innerText = count;
                    await new Promise(r => setTimeout(r, 1000));
                }
                countdownEl.innerText = "";

                // Flash
                flashEl.classList.remove('flash-active');
                void flashEl.offsetWidth; 
                flashEl.classList.add('flash-active');

                // Capture
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = video.videoWidth;
                tempCanvas.height = video.videoHeight;
                const tCtx = tempCanvas.getContext('2d');
                tCtx.translate(tempCanvas.width, 0);
                tCtx.scale(-1, 1);
                tCtx.drawImage(video, 0, 0);
                captures.push(tempCanvas);
                
                await new Promise(r => setTimeout(r, 600)); 
            }

            renderStrip(captures);
            snapBtn.disabled = false;
            snapBtn.innerText = "TAKE 4 PHOTOS";
        });

        function renderStrip(images) {
            const w = images[0].width;
            const h = images[0].height;
            const p = 30; // Border/Padding size

            canvas.width = w + (p * 2);
            canvas.height = (h * 4) + (p * 5);
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            images.forEach((img, i) => {
                ctx.drawImage(img, p, p + (i * (h + p)));
            });

            const data = canvas.toDataURL('image/png');
            const div = document.createElement('div');
            div.className = 'strip-container';
            div.innerHTML = `<img src="${data}"><div class="footer-text">SNAP! ${new Date().toLocaleDateString()}</div>`;
            
            // On mobile, tapping the strip triggers a download
            div.onclick = () => {
                const a = document.createElement('a');
                a.href = data;
                a.download = `strip-${Date.now()}.png`;
                a.click();
            };

            gallery.prepend(div);
        }
    </script>
</body>
</html>
