<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LentraSBooth | Fixed Proportions</title>
    <style>
        :root { --accent: #ff4757; --bg: #000000; }
        body { 
            font-family: sans-serif; display: flex; flex-direction: column; 
            align-items: center; background: var(--bg); color: white; 
            margin: 0; padding: 10px; min-height: 100vh;
        }

        #stage { 
            position: relative; width: 100%; max-width: 600px; 
            aspect-ratio: 16/9; border: 2px solid #444; 
            border-radius: 8px; overflow: hidden; background: #111;
        }

        /* Object-fit: cover prevents the preview from stretching */
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        #countdown {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 100px; font-weight: 900; z-index: 10; color: white;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 11; pointer-events: none;
        }
        .flash-active { animation: flashAnim 0.3s ease-out; }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

        .controls { width: 100%; max-width: 600px; margin: 20px 0; }
        #snap { 
            width: 100%; padding: 20px; font-size: 1.2rem; cursor: pointer; border: none; 
            border-radius: 50px; background: var(--accent); color: white; font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
        }
        #snap:disabled { background: #333; opacity: 0.5; }

        #gallery { display: flex; flex-direction: column; gap: 25px; width: 100%; max-width: 380px; margin-top: 10px; }
        .strip-container { background: white; padding: 15px; border-radius: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .strip-container img { width: 100%; height: auto; display: block; border: 1px solid #eee; }
        .footer-text { color: #222; font-size: 16px; text-align: center; margin-top: 15px; font-weight: bold; font-family: 'Arial Black', sans-serif; }
    </style>
</head>
