<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LentraSBooth | Instax Kiosk</title>
    <style>
        :root { --accent: #ff4757; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #000; color: white; margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; }
        
        /* Full Screen Camera Stage */
        #stage { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; z-index: 10; cursor: pointer; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* Overlays */
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 25vw; font-weight: 900; z-index: 20; text-shadow: 0 0 30px rgba(0,0,0,0.8); pointer-events: none; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 21; pointer-events: none; }
        .flash-active { animation: flash 0.3s ease-out; }
        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }

        #hint { position: absolute; bottom: 10%; width: 100%; text-align: center; font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; z-index: 15; pointer-events: none; animation: pulse 2s infinite; text-shadow: 0 2px 10px rgba(0,0,0,1); }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* Step 2: Selection Grid */
        #selectionOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95); z-index: 50; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .options-container { display: flex; gap: 15px; width: 90%; max-width: 900px; justify-content: center; }
        .option-card { width: 30%; cursor: pointer; border: 4px solid transparent; border-radius: 10px; overflow: hidden; transition: transform 0.2s; }
        .option-card:active { transform: scale(0.95); }
        .option-card img { width: 100%; display: block; }

        /* Step 3: Result Pop-up */
        #resultOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .instax-preview { max-height: 75vh; box-shadow: 0 20px 60px rgba(0,0,0,1); }
        .instax-preview img { height: auto; max-height: 70vh; max-width: 100%; display: block; border-radius: 2px; }
        
        .btn-row { display: flex; gap: 15px; margin-top: 25px; width: 100%; max-width: 400px; }
        .btn { flex: 1; padding: 18px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; text-transform: uppercase; }
        #saveBtn { background: var(--accent); color: white; }
        #closeBtn { background: #333; color: white; }
    </style>
</head>
<body>

    <div id="stage" onclick="startSession()">
        <div id="hint">TAP TO START</div>
        <div id="countdown"></div>
        <div id="flash"></div>
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="selectionOverlay">
        <h2 style="margin-bottom: 30px; letter-spacing: 1px;">PICK YOUR FAVORITE</h2>
        <div class="options-container" id="options"></div>
    </div>

    <div id="resultOverlay">
        <div class="instax-preview" id="instaxPreview"></div>
        <div class="btn-row">
            <button class="btn" id="saveBtn">SAVE PHOTO</button>
            <button class="btn" id="closeBtn" onclick="location.reload()">RETAKE</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const countdownEl = document.getElementById('countdown');
        const flashEl = document.getElementById('flash');
        const selectionOverlay = document.getElementById('selectionOverlay');
        const optionsContainer = document.getElementById('options');
        const resultOverlay = document.getElementById('resultOverlay');
        const instaxPreview = document.getElementById('instaxPreview');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let capturedImages = [];
        let isShooting = false;

        // Initialize Camera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(s => video.srcObject = s);

        async function startSession() {
            if (isShooting) return;
            isShooting = true;
            document.getElementById('hint').style.display = 'none';

            // Optional: Auto-fullscreen on tap
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            for (let i = 0; i < 3; i++) {
                for (let c = 3; c > 0; c--) {
                    countdownEl.innerText = c;
                    await new Promise(r => setTimeout(r, 1000));
                }
                countdownEl.innerText = "";
                flashEl.classList.add('flash-active');
                setTimeout(() => flashEl.classList.remove('flash-active'), 300);

                // Create individual photo canvas
                const temp = document.createElement('canvas');
                temp.width = 800; temp.height = 1000;
                const tCtx = temp.getContext('2d');
                
                const vW = video.videoWidth;
                const vH = video.videoHeight;
                const targetRatio = 800 / 1000;
                let sW, sH, sX, sY;

                if ((vW / vH) > targetRatio) {
                    sH = vH; sW = vH * targetRatio; sX = (vW - sW) / 2; sY = 0;
                } else {
                    sW = vW; sH = vW / targetRatio; sX = 0; sY = (vH - sH) / 2;
                }

                tCtx.translate(temp.width, 0);
                tCtx.scale(-1, 1);
                tCtx.drawImage(video, sX, sY, sW, sH, 0, 0, temp.width, temp.height);
                capturedImages.push(temp.toDataURL('image/png'));
                await new Promise(r => setTimeout(r, 600)); 
            }
            showSelection();
        }

        function showSelection() {
            selectionOverlay.style.display = 'flex';
            optionsContainer.innerHTML = '';
            capturedImages.forEach((src) => {
                const div = document.createElement('div');
                div.className = 'option-card';
                div.innerHTML = `<img src="${src}">`;
                div.onclick = () => generateInstax(src);
                optionsContainer.appendChild(div);
            });
        }

        function generateInstax(selectedSrc) {
            selectionOverlay.style.display = 'none';
            
            // Instax Frame Math
            const p = 60;        // Side/Top Margins
            const bottomP = 220;  // Signature area
            const photoW = 800;
            const photoH = 1000;

            canvas.width = photoW + (p * 2);
            canvas.height = photoH + p + bottomP;

            // Draw Paper
            ctx.fillStyle = "#fcfcfc"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => {
                // Draw Photo
                ctx.drawImage(img, p, p, photoW, photoH);
                
                // Realistic internal stroke
                ctx.strokeStyle = "rgba(0,0,0,0.08)";
                ctx.lineWidth = 2;
                ctx.strokeRect(p, p, photoW, photoH);

                const finalData = canvas.toDataURL('image/png');
                instaxPreview.innerHTML = `<img src="${finalData}">`;
                resultOverlay.style.display = 'flex';

                document.getElementById('saveBtn').onclick = () => {
                    const a = document.createElement('a');
                    a.href = finalData; a.download = `instax-${Date.now()}.png`; a.click();
                };
            };
            img.src = selectedSrc;
        }
    </script>
</body>
</html>
